name: Docker Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image
        run: docker build -t myapp:latest .

      - name: Run container
        run: docker run -d --name myapp -p 8080:80 myapp:latest

      - name: Test container running
        run: |
          sleep 3
          curl http://localhost:8080
